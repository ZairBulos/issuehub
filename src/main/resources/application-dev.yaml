spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/issuehub_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}

  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  devtools:
    restart:
      enabled: true

  docker:
    compose:
      enabled: true

jwt:
  secret: ${JWT_SECRET:secret}
  issuer: ${JWT_ISSUER:issuehub}
  audience: ${JWT_AUDIENCE:issuehub-api}
  accessTokenExpiration: ${JWT_ACCESS_TOKEN_EXPIRATION:PT15M}
  refreshTokenExpiration: ${JWT_REFRESH_TOKEN_EXPIRATION:P7D}

app:
  github:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}
    callback-url: ${GITHUB_CALLBACK_URL:http://localhost:8080/integrations/github/callback}

  encryption:
    secret-key: ${APP_ENCRYPTION_SECRET_KEY}